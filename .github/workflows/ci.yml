name: Lint

on:
    push:
        branches:
            - main

jobs:
    lint:
        runs-on: ubuntu-latest
        name : Lint check
        steps:
            - uses: actions/checkout@v2
              name: Checkout repository
            - name: Python install
              uses: actions/setup-python@v2
              with:
                  python-version: 3.10
            - name: Install dependencies
              run: pip install flake8
            - name: lint with flake8
              run: flake8 src/

